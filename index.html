<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Control de Finanzas</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">

    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- Estilos CSS propios -->
    <link rel="stylesheet" href="./css/styles.css">
</head>

<body>

    <div class="container py-4">

        <!-- TITULO -->
        <div class="text-center mb-4">
            <h1 class="fw-bold">
                <i class="bi bi-wallet2"></i>
                Control de Finanzas YFGT
            </h1>
            <p class="text-muted">
                Gestiona ingresos y gastos fácilmente
            </p>
        </div>

        <!-- RESUMEN -->
        <div class="row g-3 mb-4">
            <div class="col-md-4">
                <div class="card card-summary p-3">
                    <h5>Ingresos</h5>
                    <h2 class="money-positive" id="totalIngresos">
                        $0
                    </h2>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card card-summary p-3">
                    <h5>Gastos</h5>
                    <h2 class="money-negative" id="totalGastos">
                        $0
                    </h2>
                </div>
            </div>
            <div class="col-md-4">
                <div class="card card-summary p-3">
                    <h5>Saldo</h5>
                    <h2 id="saldoFinal">$0</h2>
                </div>
            </div>
        </div>

        <div class="row">

            <!-- FORMULARIO INGRESOS -->
            <div class="col-lg-4 mb-4">
                <div class="card shadow-sm border-0 rounded-custom">
                    <div class="card-body">
                        <h4 class="text-success mb-3">
                            <i class="bi bi-cash-coin"></i>
                            Nuevo Ingreso
                        </h4>
                        <form id="ingresoForm">
                            <div class="mb-3">
                                <label class="form-label">
                                    Categoría
                                </label>
                                <select class="form-select" id="ingresoCategoria" required>
                                    <option>Sueldo</option>
                                    <option>Trabajo Extra</option>
                                    <option>Ventas</option>
                                    <option>Solicitud Préstamo</option>
                                    <option>Otros ingresos</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">
                                    Descripción
                                </label>
                                <input type="text" class="form-control" id="ingresoDescripcion" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">
                                    Monto
                                </label>
                                <input type="number" class="form-control" id="ingresoMonto" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">
                                    Fecha
                                </label>
                                <input type="date" class="form-control" id="ingresoFecha" required>
                            </div>
                            <button class="btn btn-success w-100">
                                <i class="bi bi-plus-circle"></i>
                                Guardar Ingreso
                            </button>
                        </form>
                    </div>
                </div>
            </div>

            <!-- FORMULARIO GASTOS -->
            <div class="col-lg-4 mb-4">
                <div class="card shadow-sm border-0 rounded-custom">
                    <div class="card-body">
                        <h4 class="text-danger mb-3">
                            <i class="bi bi-cart-dash"></i>
                            Nuevo Gasto
                        </h4>
                        <form id="gastoForm">
                            <div class="mb-3">
                                <label class="form-label">
                                    Categoría
                                </label>
                                <select class="form-select" id="gastoCategoria" required>
                                    <option>Arriendo</option>
                                    <option>Comida</option>
                                    <option>Transporte</option>
                                    <option>Salud</option>
                                    <option>Entretención</option>
                                    <option>Servicios</option>
                                    <option>Devolución Préstamo</option>
                                    <option>Otros Gastos</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">
                                    Descripción
                                </label>
                                <input type="text" class="form-control" id="gastoDescripcion" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">
                                    Monto
                                </label>
                                <input type="number" class="form-control" id="gastoMonto" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label">
                                    Fecha
                                </label>
                                <input type="date" class="form-control" id="gastoFecha" required>
                            </div>
                            <button class="btn btn-danger w-100">
                                <i class="bi bi-dash-circle"></i>
                                Guardar Gasto
                            </button>
                        </form>
                    </div>
                </div>
            </div>

            <!-- GRÁFICO -->
            <div class="col-lg-4 mb-4">
                <div class="card shadow-sm border-0 rounded-custom">
                    <div class="card-body">
                        <h4 class="mb-3">
                            <i class="bi bi-pie-chart"></i>
                            Gastos por Categoría
                        </h4>

                        <div class="chart-container">
                            <canvas id="expenseChart"></canvas>
                        </div>
                    </div>
                </div>
            </div>

        </div>

        <div class="row">

            <!-- TABLA -->
            <div class="col-lg-12">

                <!-- HISTORIAL -->
                <div class="card shadow-sm border-0 rounded-custom">
                    <div class="card-body">
                        <div class="d-flex justify-content-between align-items-center mb-3">
                            <h4>
                                <i class="bi bi-clock-history"></i>
                                Historial
                            </h4>
                            <button class="btn btn-danger btn-sm" onclick="eliminarTodo()">
                                <i class="bi bi-trash"></i>
                                Eliminar Todo
                            </button>
                        </div>
                        <div class="row ml-4 mb-3">
                            <div class="col-md-4">
                                <select class="form-select" id="filtroCategorias">
                                    <option value="">Todas las categorías</option>
                                    <option>Sueldo</option>
                                    <option>Trabajo Extra</option>
                                    <option>Ventas</option>
                                    <option>Solicitud Préstamo</option>
                                    <option>Otros ingresos</option>
                                    <option>Arriendo</option>
                                    <option>Comida</option>
                                    <option>Transporte</option>
                                    <option>Salud</option>
                                    <option>Entretención</option>
                                    <option>Servicios</option>
                                    <option>Devolución Préstamo</option>
                                    <option>Otros Gastos</option>
                                </select>
                            </div>

                        </div>
                        <div class="table-container">
                            <table class="table align-middle">
                                <thead>
                                    <tr>
                                        <th>Tipo</th>
                                        <th>Categoría</th>
                                        <th>Descripción</th>
                                        <th>Monto</th>
                                        <th>Fecha</th>
                                        <th></th>
                                    </tr>
                                </thead>
                                <tbody id="listaTransacciones">

                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

            </div>

        </div>

    </div>

    <script src="./js/apps.js"></script>

</body>

</html>
